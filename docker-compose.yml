name: investigarr

services:
  investigarr:
    build: .
    image: danilo/investigarr:latest
    container_name: investigarr
    restart: unless-stopped
    ports:
      - "${DOCKER_BIND_IP}:8788:8788"
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-America/Sao_Paulo}
      - PORT=${PORT:-8788}
      - INVESTIGARR_USERNAME=${INVESTIGARR_USERNAME:-admin}
      - INVESTIGARR_PASSWORD=${INVESTIGARR_PASSWORD:?Set INVESTIGARR_PASSWORD in .env}
      - LOG_TAIL=${LOG_TAIL:-250}
      - LOG_SINCE=${LOG_SINCE:-2h}
      - SERVICES=${SERVICES:-sonarr,radarr,prowlarr,lidarr,seerr,qbittorrent,jellyfin,readarr,mylar3,bazarr,sabnzbd}
      - JELLYFIN_API_KEY=${JELLYFIN_API_KEY:-}
      - DOCKER_PROXY_URL=${DOCKER_PROXY_URL:-http://dockerproxy:2375}
    volumes:
      - ${DOCKER_CONTAINERS_DIR:-/var/lib/docker/containers}:/var/lib/docker/containers:ro
      - ./data:/app/data
      - ${DOCKER_MEDIA_DIR:-/mnt/internal/media}:/media
    networks:
      - media-net
      - investigarr-internal
    depends_on:
      - dockerproxy

  dockerproxy:
    image: ghcr.io/tecnativa/docker-socket-proxy:latest
    container_name: investigarr-dockerproxy
    restart: unless-stopped
    environment:
      - CONTAINERS=1
      - RESTARTS=1
      - POST=1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - investigarr-internal

networks:
  media-net:
    external: true
  investigarr-internal:
    internal: true
